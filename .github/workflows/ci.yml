name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx ng lint
        continue-on-error: true

      - name: Run tests (headless Chrome)
        run: npx ng test --no-watch --no-progress --browsers=ChromeHeadless --code-coverage

      - name: Build (production)
        run: npx ng build --configuration=production

      - name: Upload coverage report
        if: always() && matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload production bundle
        if: success() && matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: dist-studyjarviswebapp
          path: dist/studyjarviswebapp/
          retention-days: 14
