<div class="flex min-h-dvh items-center justify-center bg-gradient-to-b from-bg to-primary-50 px-4 py-12">
  <div class="w-full max-w-sm">
    <div class="mb-6 flex flex-col items-center text-center">
      <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-primary-600 text-white shadow-[var(--shadow-pop)]">
        <lucide-icon [img]="BookOpenText" [size]="28"></lucide-icon>
      </div>
      <h1 class="mt-4 text-2xl font-bold text-ink">StudyJarvis</h1>
      <p class="mt-1 text-sm text-muted">Your AI study companion</p>
    </div>

    <div class="rounded-2xl border border-border bg-surface p-6 shadow-[var(--shadow-card)]">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-4">
          <label for="username" class="mb-1.5 block text-sm font-medium text-ink">Username</label>
          <input
            id="username"
            formControlName="username"
            type="text"
            autocomplete="username"
            placeholder="Your username"
            class="w-full rounded-md border border-border bg-surface px-3 py-2.5 text-sm text-ink placeholder:text-muted focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/25 transition"
          />
        </div>

        <div class="mb-5">
          <label for="password" class="mb-1.5 block text-sm font-medium text-ink">Password</label>
          <input
            id="password"
            formControlName="password"
            type="password"
            autocomplete="current-password"
            placeholder="Your password"
            class="w-full rounded-md border border-border bg-surface px-3 py-2.5 text-sm text-ink placeholder:text-muted focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/25 transition"
          />
        </div>

        <button
          type="submit"
          [disabled]="!canSubmit"
          class="inline-flex w-full items-center justify-center gap-2 rounded-md bg-primary-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-primary-700 disabled:cursor-not-allowed disabled:bg-border disabled:text-muted transition-colors"
        >
          @if (loading()) {
            <span class="h-4 w-4 rounded-full border-2 border-white/30 border-t-white" style="animation: sj-spin 0.8s linear infinite;"></span>
            Signing in…
          } @else {
            Sign in
            <lucide-icon [img]="ArrowRight" [size]="14"></lucide-icon>
          }
        </button>

        @if (errorMessage()) {
          <div
            class="mt-4 rounded-md border border-danger-500/30 bg-danger-500/10 px-3 py-2 text-center text-sm text-danger-600"
            role="alert"
            style="animation: sj-shake 300ms ease-out;"
          >
            {{ errorMessage() }}
          </div>
        }
      </form>
    </div>
  </div>
</div>
